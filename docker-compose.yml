version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vault-db
    environment:
      POSTGRES_DB: pass_manager_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Uralov2005
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    image: shaxobiddindev/vault-backend:latest  # <--- Build emas, tayyor image ishlatiladi
    container_name: vault-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/pass_manager_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=Uralov2005
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
